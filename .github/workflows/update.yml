name: ETF轮动策略 · 每日更新

on:
  schedule:
    # 北京时间 13:20 (UTC+8) → UTC 5:20
    - cron: '20 5 * * 1-5'
  # 允许手动触发
  workflow_dispatch:

jobs:
  compute:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install numpy akshare

      - name: 计算策略信号
        run: python compute.py

      - name: 提交结果
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.json kline_cache.json || true
          git diff --staged --quiet || git commit -m "📊 更新策略信号 $(date +'%Y-%m-%d %H:%M')"
          git push
